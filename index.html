<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Daily Report</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      .arialRow td {
        font-family: "Arimo", Arial, Helvetica, sans-serif;
      }

      .calibriRow td {
        font-family: Calibri, sans-serif;
      }

      .georgiaRow td {
        font-family: Georgia, serif;
      }
      .bookRow td {
        font-family: "Book Antiqua", Palatino, serif;
      }
      body {
        font-family: "Times New Roman", Times, serif;
        background: #f2f2f2;
        padding: 20px;
      }

      /* ===== TOOLBAR ===== */
      /* ===== TOOLBAR IMPROVED ===== */
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
      }

      /* ===== BUTTON STYLE ===== */
      button {
        padding: 10px 16px;
        background: linear-gradient(135deg, #2b6cb0, #0083f6);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      }

      /* Hover Effect */
      button:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
      }

      /* Click Animation */
      button:active {
        transform: scale(0.92);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      }

      /* ===== INPUT + SELECT STYLE ===== */
      select,
      input[type="color"] {
        padding: 6px;
        border-radius: 6px;
        border: 1px solid #ccc;
        cursor: pointer;
      }

      /* Labels spacing */
      .toolbar label {
        font-weight: bold;
        margin-left: 10px;
        align-self: center;
      }

      /* ===== REPORT PAGE ===== */

      #report {
        background: white;
        width: 1200px;
        margin: auto;
        padding: 20px;
        border: 0.5px solid #999;
        font-family: "Times New Roman", Times, serif;
      }

      /* ===== HEADER ===== */

      .header {
        display: flex;
        align-items: center;
      }

      .logo {
        width: 160px;
      }

      .headerText {
        flex: 1;
        text-align: center;
      }

      .headerText h1 {
        margin: 0;
        font-size: 40px;
        font-weight: normal;
        font-family: "Book Antiqua", Palatino, serif;
      }

      .headerText h2 {
        margin: 6px 0 10px 0;
        font-size: 28px;
        display: inline-block;
        border-bottom: 2px solid black;
        padding-bottom: 3px;
        font-weight: 800;
        font-family: "Georgia", "Book Antiqua", serif;
      }

      /* ===== DAY DATE ROW ===== */

      .dayTable {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 0;
      }

      .dayTable td {
        border: 0.1px solid #000;
        padding: 8px;
        font-size: 24px;
        font-weight: bold;
        font-family: "Book Antiqua", Palatino, serif;
      }

      .center {
        text-align: center;
      }

      /* ===== MAIN TABLE ===== */

      table.main {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        font-family: "Times New Roman", Times, serif;
      }

      table.main th,
      table.main td {
        border: 0.1px solid #000;
        padding: 10px;
        font-size: 24px;
        vertical-align: middle;
        word-wrap: break-word;
        overflow-wrap: break-word;
        white-space: pre-wrap;
        font-family: "Times New Roman", Times, serif;
      }

      .main th {
        background: #57b6ff;
        font-weight: bold;
      }
      .main th {
        text-align: center;
        vertical-align: middle;
      }
      /* ===== SERIAL COLUMN ===== */

      .sno {
        width: 80px;
        text-align: center;
      }

      /* ===== SECTION ROW ===== */

      .section td {
        text-align: center;
        font-weight: bold;
        font-size: 26px;
        background: #e9e9e9;
        font-family: "Times New Roman", Times, serif;
      }

      /* ===== DATE INPUT ===== */

      #dateInput {
        font-size: 24px;
        width: 100%;
        border: none;
        outline: none;
        text-align: center;
        background: transparent;
        font-family: "Times New Roman", Times, serif;
      }

      #displayDate {
        font-size: 24px;
        font-family: "Times New Roman", Times, serif;
      }

      /* SERIAL NUMBER COLUMN */

      .sno {
        text-align: center;
        vertical-align: middle;
        font-family: "Times New Roman", Times, serif;
      }

      /* TIMING COLUMN */

      .main td:nth-child(3),
      .main th:nth-child(3) {
        text-align: center;
        vertical-align: middle;
      }
      .main th:nth-child(1),
      .main th:nth-child(2),
      .main th:nth-child(3),
      .main th:nth-child(4) {
        font-family: "Arimo", Arial, Helvetica, sans-serif;
        height: 40px;
      }

      table {
        border-collapse: collapse;
      }
      #report img {
        max-width: 100%;
        height: auto;
      }

      @media (max-width: 900px) {
        #report {
          width: 1200px;
          transform: scale(0.8);
          transform-origin: top left;
        }
      }
      .dateBox {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      #dateInput {
        width: 100%;
        text-align: center;
      }

      #displayDate {
        font-size: 22px;
        margin-top: 4px;
        text-align: center;
      }
      .watermarkId {
        position: absolute;
        top: 130px; /* adjust if needed */
        left: 92%;
        transform: translateX(-50%);

        font-size: 40px;
        font-weight: bold;
        color: rgba(0, 0, 0, 0.15); /* transparent effect */
        font-family: "Book Antiqua", Palatino, serif;
        pointer-events: none; /* cannot click */
        user-select: none; /* cannot select */

        z-index: 0;
      }

      /* Ensure report is positioned */
      #report {
        position: relative;
      }
      .dayTable {
        position: relative;
        z-index: 1;
      }
      @media (max-width: 900px) {
        .watermarkId {
          font-size: 50px;
          top: 100px;
        }
      }
      #securityOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .securityBox {
        background: white;
        padding: 30px;
        text-align: center;
        border-radius: 10px;
        width: 300px;
      }

      .securityBox input {
        width: 90%;
        padding: 10px;
        font-size: 16px;
      }

      #errorMsg {
        color: red;
        margin-top: 10px;
      }

      /* ALIGN BUTTON STATES */
      #alignBtn {
        font-weight: bold;
        font-size: 16px;
        min-width: 40px;
        text-align: center;
      }
      #alignBtn.active-left {
        background: linear-gradient(135deg, #ff7a18, #ffb347);
      }

      #alignBtn.active-center {
        background: linear-gradient(135deg, #28a745, #5cd65c);
      }

      #alignBtn.active-right {
        background: linear-gradient(135deg, #6f42c1, #9b6bff);
      }
    </style>
  </head>

  <body>
    <!-- ===== SECURITY OVERLAY ===== -->
    <div id="securityOverlay">
      <div class="securityBox">
        <h2>🔐 Enter Secure Code</h2>
        <input type="password" id="secureCodeInput" placeholder="Enter code" />
        <br /><br />
        <button onclick="verifyCode()">Unlock</button>
        <p id="errorMsg"></p>
      </div>
    </div>
    <!-- ===== TOOLBAR ===== -->
    <div class="toolbar">
      <button onclick="saveReport()">💾 Save</button>
      <button onclick="addRow()">1➕ S.NO</button>
      <button onclick="addNormalRow()">➕ No S.NO</button>
      <button onclick="restartSerial()">🔄 Reset</button>
      <button onclick="deleteRow()">❌ Delete</button>
      <button onclick="toggleEditSerial()">✏️ Edit S.NO</button>

      <label>BG</label>
      <input type="color" onchange="changeBg(this.value)" />

      <label>Text</label>
      <input type="color" onchange="changeFontColor(this.value)" />

      <label>Font</label>
      <select onchange="changeFont(this.value)">
        <option value="Times New Roman">Times</option>
        <option value="Arimo, Arial, Helvetica, sans-serif">Arial</option>
        <option value="Calibri">Calibri</option>
        <option value="Georgia">Georgia</option>
      </select>

      <button onclick="toggleBold()">𝐁</button>
      <button onclick="toggleItalic()">𝑰</button>
      <button onclick="capitalize()">🔠</button>
      <button id="alignBtn" onclick="centerText()">LEFT</button>
    </div>
    <div
      id="reportPreview"
      style="display: none; text-align: center; margin-top: 20px"
    ></div>
    <div id="report">
      <div class="watermarkId">5793</div>
      <!-- ===== HEADER ===== -->
      <div class="header">
        <img class="logo" src="img/open_minds_logo.jpg" />
        <div class="headerText">
          <h1>OPEN MINDS - A BIRLA SCHOOL KANKARBAGH</h1>
          <h2>DAILY REPORT: Deptt of Examination</h2>
        </div>
      </div>

      <!-- ===== DAY DATE ===== -->
      <table class="dayTable">
        <colgroup>
          <col style="width: 80px" />
          <col style="width: 580px" />
          <col style="width: 140px" />
          <col style="width: 140px" />
        </colgroup>

        <tr class="center">
          <td>DAY</td>
          <td id="dayCell"></td>
          <td>DATE:</td>
          <td>
            <div class="dateBox">
              <input id="dateInput" type="date" onchange="updateDay()" />
              <div id="displayDate"></div>
            </div>
          </td>
        </tr>
      </table>

      <!-- ===== MAIN TABLE ===== -->
      <table class="main">
        <colgroup>
          <col style="width: 80px" />
          <col style="width: 580px" />
          <col style="width: 140px" />
          <col style="width: 140px" />
        </colgroup>

        <thead>
          <tr>
            <th>S.NO</th>
            <th>DESCRIPTION</th>
            <th>TIMING</th>
            <th>REMARK</th>
          </tr>
        </thead>

        <tbody id="tbody">
          <tr class="section" contenteditable="true">
            <td></td>
            <td>EXAMINATION WORKS</td>
            <td></td>
            <td></td>
          </tr>

          <tr class="data-row">
            <td class="sno">1</td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
          </tr>

          <tr class="data-row">
            <td class="sno">2</td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
          </tr>

          <tr class="data-row">
            <td class="sno">3</td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
          </tr>

          <tr class="section" contenteditable="true">
            <td></td>
            <td>OTHER WORKS</td>
            <td></td>
            <td></td>
          </tr>

          <tr class="data-row">
            <td class="sno">1</td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      let selectedCell = null;
      let currentStyle = {
        fontFamily: "Times New Roman",
        color: "",
        fontWeight: "",
        fontStyle: "",
        textTransform: "",
        textAlign: "",
      };

      function applyCurrentStyle(row) {
        Array.from(row.cells).forEach((cell) => {
          if (currentStyle.fontFamily)
            cell.style.fontFamily = currentStyle.fontFamily;

          if (currentStyle.color) cell.style.color = currentStyle.color;

          if (currentStyle.fontWeight)
            cell.style.fontWeight = currentStyle.fontWeight;

          if (currentStyle.fontStyle)
            cell.style.fontStyle = currentStyle.fontStyle;

          if (currentStyle.textTransform)
            cell.style.textTransform = currentStyle.textTransform;

          if (currentStyle.textAlign)
            cell.style.textAlign = currentStyle.textAlign;
        });
      }

      document.addEventListener("click", (e) => {
        let cell = e.target.closest("td");

        if (!cell) return;

        selectedCell = cell;
      });

      const tbody = document.getElementById("tbody");

      /* ---------- FIND NEXT SERIAL ---------- */

      function getNextSerial(row) {
        let serial = 0;

        let current = row;

        while (current) {
          current = current.previousElementSibling;

          if (!current) break;

          if (current.classList.contains("section")) break;

          let val = parseInt(current.cells[0].innerText);

          if (!isNaN(val)) {
            serial = val;
            break;
          }
        }

        return serial + 1;
      }
      /* ---------- ADD SERIAL ROW ---------- */

      function createSerialRow(number) {
        let tr = document.createElement("tr");

        tr.className = "data-row";

        tr.innerHTML = `
<td class="sno">${number}</td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
`;

        applyCurrentStyle(tr); // ⭐ APPLY CURRENT STYLE
        return tr;
      }

      /* ---------- ADD NORMAL ROW ---------- */

      function createNormalRow() {
        let tr = document.createElement("tr");

        tr.className = "normal-row"; // ⭐ IMPORTANT

        tr.innerHTML = `
<td></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
`;

        applyCurrentStyle(tr);
        return tr;
      }

      /* ---------- TOOLBAR ADD ROW ---------- */

      function addRow() {
        let lastRow = tbody.lastElementChild;

        let number = getNextSerial(lastRow);

        tbody.appendChild(createSerialRow(number));
      }

      function addNormalRow() {
        tbody.appendChild(createNormalRow());
      }

      /* ---------- DELETE ROW ---------- */

      function deleteRow() {
        if (!selectedCell) return;

        let row = selectedCell.parentElement;

        row.remove();

        restartSerial();
      }
      /* ---------- RESTART SERIAL ---------- */

      function restartSerial() {
        let rows = Array.from(tbody.querySelectorAll("tr"));
        let serial = 0;

        rows.forEach((row) => {
          // 🔥 RESET on section OR normal row
          if (
            row.classList.contains("section") ||
            row.classList.contains("normal-row")
          ) {
            serial = 0;
            return;
          }

          // Only number serial rows
          if (row.classList.contains("data-row")) {
            serial++;
            row.cells[0].innerText = serial;
          }
        });
      }
      /* ---------- ENTER KEY LOGIC ---------- */

      document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;

        let cell = document.activeElement;
        if (cell.getAttribute("contenteditable") !== "true") return;

        e.preventDefault();

        let row = cell.parentElement;
        let nextRow = row.nextElementSibling;

        let currentNumber = parseInt(row.cells[0].innerText) || 0;

        /* ✅ CASE 1: Next is SECTION */
        if (nextRow && nextRow.classList.contains("section")) {
          let newRow = createSerialRow(1); // restart
          tbody.insertBefore(newRow, nextRow);
          restartSerial();
          newRow.cells[cell.cellIndex].focus();
          return;
        }

        /* ✅ CASE 2: Next is NORMAL ROW (YOUR REQUIREMENT) */
        if (nextRow && nextRow.classList.contains("normal-row")) {
          let newRow = createSerialRow(1); // 🔥 restart like section
          tbody.insertBefore(newRow, nextRow); // insert ABOVE blank row
          restartSerial();
          newRow.cells[cell.cellIndex].focus();
          return;
        }

        /* ✅ CASE 3: Next is DATA ROW */
        if (nextRow && nextRow.classList.contains("data-row")) {
          nextRow.cells[cell.cellIndex].focus();
          return;
        }

        /* ✅ CASE 4: No next row → continue */
        let newRow = createSerialRow(currentNumber + 1);
        tbody.appendChild(newRow);
        newRow.cells[cell.cellIndex].focus();
      });
      /* ---------- STYLE TOOLS ---------- */

      function changeBg(color) {
        if (!selectedCell) return;

        let row = selectedCell.parentElement;

        Array.from(row.cells).forEach((cell) => {
          cell.style.backgroundColor = color;
        });
      }

      /*function changeFont(font) {
        let rows = document.querySelectorAll(".data-row");

        rows.forEach((row) => {
          Array.from(row.cells).forEach((cell) => {
            cell.style.fontFamily = font;
          });
        });
      }*/

      function changeFont(font) {
        currentStyle.fontFamily = font;

        document.querySelectorAll(".data-row").forEach((row) => {
          applyCurrentStyle(row);
        });
      }

      function capitalize() {
        if (!selectedCell) return;

        let row = selectedCell.parentElement;

        Array.from(row.cells).forEach((cell) => {
          if (cell.style.textTransform === "uppercase") {
            cell.style.textTransform = "none";
          } else {
            cell.style.textTransform = "uppercase";
          }
        });
      }

      function centerText() {
        if (!selectedCell) return;

        // ✅ Get REAL alignment (important fix)
        let currentAlign = window.getComputedStyle(selectedCell).textAlign;

        let nextAlign;

        if (currentAlign === "left" || currentAlign === "start") {
          nextAlign = "center";
        } else if (currentAlign === "center") {
          nextAlign = "right";
        } else {
          nextAlign = "left";
        }

        // Apply only to selected cell
        selectedCell.style.textAlign = nextAlign;

        // Update button UI
        updateAlignButton(nextAlign);
      }
      function updateAlignButton(align) {
        const btn = document.getElementById("alignBtn");

        btn.classList.remove("active-left", "active-center", "active-right");

        if (align === "left" || align === "start") {
          btn.classList.add("active-left");
          btn.innerText = "LEFT";
        } else if (align === "center") {
          btn.classList.add("active-center");
          btn.innerText = "CENTER";
        } else if (align === "right" || align === "end") {
          btn.classList.add("active-right");
          btn.innerText = "RIGHT";
        }
      }

      /* ---------- SAVE IMAGE ---------- */
      async function saveReport() {
        let input = document.getElementById("dateInput");
        let span = document.getElementById("displayDate");

        input.style.display = "none";
        span.style.display = "inline";

        const element = document.getElementById("report");

        /* ===== STEP 1: WAIT FOR FONT LOAD ===== */
        await document.fonts.ready;

        /* ===== FORCE DESKTOP VIEW ===== */
        const originalTransform = element.style.transform;
        const originalWidth = element.style.width;

        element.style.transform = "none";
        element.style.width = "1200px";

        /* FORCE BODY WIDTH */
        document.body.style.width = "1300px";
        document.body.style.minWidth = "1300px";
        document.body.style.overflow = "visible";

        /* FIX TABLE STRUCTURE */
        document.querySelectorAll("table").forEach((tbl) => {
          tbl.style.tableLayout = "fixed";
        });

        document.querySelectorAll(".main td, .main th").forEach((cell) => {
          cell.style.width = cell.offsetWidth + "px";
        });

        /* ===== CAPTURE ===== */
        const canvas = await html2canvas(element, {
          scale: 3,
          backgroundColor: "#ffffff",
          useCORS: true,
        });

        /* ===== RESTORE ===== */
        element.style.transform = originalTransform;
        element.style.width = originalWidth;

        document.body.style.width = "";
        document.body.style.minWidth = "";
        document.body.style.overflow = "";

        document.querySelectorAll("table").forEach((tbl) => {
          tbl.style.tableLayout = "";
        });

        const dataURL = canvas.toDataURL("image/png", 1);
        const date = span.innerText;

        const link = document.createElement("a");
        link.download = `Daily_Report_${date}.png`;
        link.href = dataURL;
        link.click();

        /* ===== COLLECT TABLE DATA ===== */

        let rows = [];
        document.querySelectorAll("#tbody tr").forEach((row) => {
          let rowData = {
            type: row.classList.contains("section") ? "section" : "data",
            cells: [],
          };

          Array.from(row.cells).forEach((cell) => {
            rowData.cells.push(cell.innerText);
          });

          rows.push(rowData);
        });

        const reportData = {
          date: date,
          day: document.getElementById("dayCell").innerText,
          rows: rows,
        };

        /* ===== SAVE JSON TO SERVER ===== */

        await fetch("https://daily-report-s9yq.onrender.com/save-report-json", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(reportData),
        });

        input.style.display = "inline";
        span.style.display = "none";

        alert("Report saved locally + backup saved to GitHub JSON");
      }
      /* ---------- DATE + DAY ---------- */

      function updateDay() {
        let input = document.getElementById("dateInput").value;

        if (!input) return;

        let parts = input.split("-");

        let yyyy = parts[0];
        let mm = parts[1];
        let dd = parts[2];

        let indianDate = `${dd}-${mm}-${yyyy}`;

        document.getElementById("displayDate").innerText = indianDate;

        let days = [
          "SUNDAY",
          "MONDAY",
          "TUESDAY",
          "WEDNESDAY",
          "THURSDAY",
          "FRIDAY",
          "SATURDAY",
        ];

        let d = new Date(input);

        document.getElementById("dayCell").innerText = days[d.getDay()];
        loadReport(indianDate);
      }

      /* ---------- DEFAULT TODAY ---------- 

      window.onload = function () {
        let today = new Date();

        let yyyy = today.getFullYear();
        let mm = String(today.getMonth() + 1).padStart(2, "0");
        let dd = String(today.getDate()).padStart(2, "0");

        document.getElementById("dateInput").value = `${yyyy}-${mm}-${dd}`;

        updateDay();
      };*/

      function toggleBold() {
        if (!selectedCell) return;

        let row = selectedCell.parentElement;

        Array.from(row.cells).forEach((cell) => {
          cell.style.fontWeight =
            cell.style.fontWeight === "bold" ? "normal" : "bold";
        });
      }

      function toggleItalic() {
        if (!selectedCell) return;

        let row = selectedCell.parentElement;

        Array.from(row.cells).forEach((cell) => {
          cell.style.fontStyle =
            cell.style.fontStyle === "italic" ? "normal" : "italic";
        });
      }

      function changeFontColor(color) {
        if (!selectedCell) return;

        let row = selectedCell.parentElement;

        Array.from(row.cells).forEach((cell) => {
          cell.style.color = color;
        });
      }

      async function loadReport(date) {
        const url = `https://raw.githubusercontent.com/abhijeetraj22/daily_report_storage/main/json/${date}.json?cache=${Date.now()}`;
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error();

          const data = await res.json();

          document.getElementById("dayCell").innerText = data.day;

          const tbody = document.getElementById("tbody");
          tbody.innerHTML = "";

          data.rows.forEach((r) => {
            let tr = document.createElement("tr");

            if (r.type === "section") {
              tr.className = "section";
            } else {
              tr.className = "data-row";
            }

            r.cells.forEach((c, index) => {
              let td = document.createElement("td");
              td.innerText = c;

              if (index === 0 && r.type === "data") {
                td.classList.add("sno");
              }

              if (r.type !== "section") {
                td.setAttribute("contenteditable", "true");
              }

              tr.appendChild(td);
            });
            tbody.appendChild(tr);
            setTimeout(() => {
              lockSerialNumbers();
            }, 50);
          });
        } catch (err) {
          console.log("No saved report");

          resetDefaultTable();
        }
      }

      let serialEditMode = false;

      function toggleEditSerial() {
        let btn = event.target;
        let serialCells = document.querySelectorAll(".data-row .sno");

        serialEditMode = !serialEditMode;
        serialCells.forEach((cell) => {
          if (serialEditMode) {
            cell.setAttribute("contenteditable", "true");
            cell.style.background = "#fff3cd";
          } else {
            cell.removeAttribute("contenteditable");
            cell.style.background = "";
          }
        });
        btn.innerText = serialEditMode ? "Lock S.NO" : "Edit All S.NO";
      }

      function resetDefaultTable() {
        const tbody = document.getElementById("tbody");
        setTimeout(() => {
          lockSerialNumbers();
        }, 50);
        tbody.innerHTML = `
<tr class="section" contenteditable="true">
<td></td>
<td>EXAMINATION WORKS</td>
<td></td>
<td></td>
</tr>

<tr class="data-row">
<td class="sno">1</td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
</tr>

<tr class="data-row">
<td class="sno">2</td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
</tr>

<tr class="data-row">
<td class="sno">3</td>
<td contenteditable="true"></td>

<td contenteditable="true"></td>
</tr>

<tr class="section" contenteditable="true">

</tr>

<td class="sno">1</td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
</tr>
`;
      }
      window.onload = function () {
        // 🔒 Lock page before login
        document.body.style.overflow = "hidden";

        // 🚀 WAKE SERVER (IMPORTANT)
        wakeUpServer();

        // 📅 Date setup
        let today = new Date();

        let yyyy = today.getFullYear();
        let mm = String(today.getMonth() + 1).padStart(2, "0");
        let dd = String(today.getDate()).padStart(2, "0");

        document.getElementById("dateInput").value = `${yyyy}-${mm}-${dd}`;

        updateDay();

        // 🔒 LOCK S.NO BY DEFAULT
        lockSerialNumbers();

        // ✅ ENTER KEY SUPPORT
        document
          .getElementById("secureCodeInput")
          .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
              verifyCode();
            }
          });
      };

      function lockSerialNumbers() {
        let serialCells = document.querySelectorAll(".data-row .sno");

        serialCells.forEach((cell) => {
          cell.removeAttribute("contenteditable"); // 🔒 lock
          cell.style.background = ""; // reset color
        });

        serialEditMode = false;

        // Reset button text
        let btn = document.querySelector(
          'button[onclick="toggleEditSerial()"]',
        );
        if (btn) btn.innerText = "✏️ Edit S.NO";
      }

      document.addEventListener("contextmenu", (e) => e.preventDefault());

      document.addEventListener("keydown", function (e) {
        if (e.key === "F12") e.preventDefault();
        if (e.ctrlKey && e.shiftKey && e.key === "I") e.preventDefault();
        if (e.ctrlKey && e.shiftKey && e.key === "J") e.preventDefault();
        if (e.ctrlKey && e.key === "U") e.preventDefault();
      });

      // 🔒 EXTRA SECURITY END
      async function verifyCode() {
        const code = document.getElementById("secureCodeInput").value;

        const res = await fetch(
          "https://daily-report-s9yq.onrender.com/verify-code",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ code: code }),
          },
        );

        const data = await res.json();

        if (data.status === "success") {
          document.getElementById("securityOverlay").style.display = "none";
          document.body.style.overflow = "auto"; // 🔓 unlock
        } else {
          document.getElementById("errorMsg").innerText = "❌ Wrong Code!";
        }
      }

      async function wakeUpServer() {
        try {
          await fetch("https://daily-report-s9yq.onrender.com/", {
            method: "GET",
          });
          console.log("✅ Server wake-up ping sent");
        } catch (e) {
          console.log("⚠️ Wake-up failed (will retry later)");
        }
      }
    </script>
  </body>
